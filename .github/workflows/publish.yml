# ───────────────────
# Hugo Site Deployment
# ───────────────────
# Automating the build and deployment process ensures consistent publishing
# while eliminating manual steps that could introduce errors.
name: Deploy Hugo Site to GitHub Pages

# Triggers
# ───────────────────
on:
  push:
    branches: ["main"]  # Main branch contains production-ready content only.
  workflow_dispatch:    # Enables manual deployments for testing or emergency fixes.

# Permissions
# ───────────────────
# GitHub's principle of least privilege applied to token permissions.
permissions:
  contents: read        # Source access needed but no content modification required.
  pages: write          # Required to publish to GitHub Pages destination.
  id-token: write       # Enables secure deployment without storing credentials.

# Concurrency
# ───────────────────
# Ensures resource efficiency while maintaining deployment integrity.
# Production deployments should never be abruptly terminated.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Bash provides consistent behavior across different GitHub-hosted runners.
defaults:
  run:
    shell: bash

# Jobs
# ───────────────────
jobs:
  # Build Job
  # ───────────────
  # Separating build ensures proper dependency management and artifact creation.
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.128.0  # Pinned for reproducible builds.
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Ensures theme assets are available during build.
      
      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
      
      - name: Install Node.js dependencies
        # Only attempts installation if package files exist - prevents errors on pure Hugo sites.
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      
      - name: Build Hugo site
        env:
          # Using runner temp ensures cache isolation between workflow runs.
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          # Production builds enable optimizations and proper environment-specific features.
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      
      - name: Upload site artifacts
        uses: actions/upload-pages-artifact@v3
        with:
              # The actions/deploy-pages@v4 action expects static-site artifacts in this 
              # standardized location for GitHub Pages deployment.
          path: ./public

  # Deployment Job
  # ───────────────
  # Isolated deployment stage provides clearer error boundaries and distinct permissions.
  deploy:
    environment:
      name: github-pages
      # Dynamic URL ensures links remain correct if repository or branch changes.
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # Sequential execution prevents deploying incomplete or failed builds.
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Dependabot Configuration
#
# This site has a small dependency surface, so weekly update checks balance
# dependency currency with notification volume.

version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "go.mod"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "github"
    labels:
      - dependencies
